<main class="flex-grow pt-32 pb-xl px-margin-mobile md:px-margin-desktop flex items-center justify-center relative overflow-hidden">
<!-- Atmospheric WebGL Shader Background -->

<!-- Form Card -->

<h1 class="font-headline-lg text-headline-lg text-on-surface text-center">Registrar Medicamento</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2 text-center">Complete la información para actualizar el inventario de FarmaVida.</p>
</div>
<form class="space-y-6" id="medicamentoForm">
<!-- Grid for better layout on desktop -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Medication Name -->
<div class="md:col-span-2 floating-label-group">
<input class="w-full h-14 px-4 pt-2 bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary-container focus:bg-white transition-all duration-300 font-body-md text-body-md" id="nombre" name="nombre" placeholder=" " type="text"/>
<label class="font-body-md text-body-md" for="nombre">Nombre del Medicamento</label>
</div>
<!-- Category Dropdown -->
<div class="flex flex-col">
<label class="ml-2 mb-2 font-label-md text-label-md text-outline" for="categoria">Categoría</label>
<div class="relative">
<select class="w-full h-14 pl-4 pr-10 bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary-container focus:bg-white appearance-none transition-all duration-300 font-body-md text-body-md" id="categoria" name="categoria">
<option disabled="" selected="" value="">Seleccione una...</option>
<option value="analgesicos">Analgésicos</option>
<option value="antibioticos">Antibióticos</option>
<option value="vitaminas">Vitaminas y Suplementos</option>
<option value="respiratorio">Respiratorio</option>
<option value="digestivo">Digestivo</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-4 text-outline pointer-events-none">expand_more</span>
</div>
</div>
<!-- SKU / Code -->
<div class="floating-label-group">
<input class="w-full h-14 px-4 pt-2 bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary-container focus:bg-white transition-all duration-300 font-body-md text-body-md" id="codigo" name="codigo" placeholder=" " type="text"/>
<label class="font-body-md text-body-md" for="codigo">Código SKU</label>
</div>
<!-- Price -->
<div class="floating-label-group">
<input class="w-full h-14 px-4 pt-2 bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary-container focus:bg-white transition-all duration-300 font-body-md text-body-md" id="precio" name="precio" placeholder=" " step="0.01" type="number"/>
<label class="font-body-md text-body-md" for="precio">Precio Unitario ($)</label>
</div>
<!-- Stock Quantity -->
<div class="floating-label-group">
<input class="w-full h-14 px-4 pt-2 bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary-container focus:bg-white transition-all duration-300 font-body-md text-body-md" id="stock" name="stock" placeholder=" " type="number"/>
<label class="font-body-md text-body-md" for="stock">Cantidad en Stock</label>
</div>
<!-- Expiration Date -->
<div class="md:col-span-2 floating-label-group">
<input class="w-full h-14 px-4 pt-2 bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary-container focus:bg-white transition-all duration-300 font-body-md text-body-md" id="vencimiento" name="vencimiento" placeholder=" " type="date"/>
<label class="font-body-md text-body-md" for="vencimiento">Fecha de Vencimiento</label>
</div>
<!-- Description -->
<div class="md:col-span-2 flex flex-col">
<label class="ml-2 mb-2 font-label-md text-label-md text-outline" for="descripcion">Notas adicionales</label>
<textarea class="w-full p-4 bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary-container focus:bg-white transition-all duration-300 font-body-md text-body-md resize-none" id="descripcion" name="descripcion" placeholder="Indicaciones, contraindicaciones..." rows="3"></textarea>
</div>
</div>
<!-- Form Actions -->
<div class="flex flex-col-reverse md:flex-row items-center justify-center gap-4 mt-8 pt-4">

                        Cancelar

<button class="w-full md:w-auto px-12 py-4 font-label-md text-label-md uppercase tracking-wider text-white bg-primary rounded-2xl shadow-lg shadow-primary/20 hover:shadow-xl hover:shadow-primary/30 hover:-translate-y-0.5 transition-all squishy-press" type="submit">
                        Guardar
                    </button>

<!-- Interactive script for feedback -->
<script>
        document.getElementById('medicamentoForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Visual success indicator
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin mr-2">sync</span> Guardando...';
            btn.disabled = true;

            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined mr-2">check_circle</span> ¡Guardado!';
                btn.classList.remove('bg-primary');
                btn.classList.add('bg-on-primary-fixed-variant');
                
                // Show notification pill
                const toast = document.createElement('div');
                toast.className = 'fixed bottom-8 left-1/2 -translate-x-1/2 px-8 py-3 bg-primary text-white font-label-md text-label-md rounded-full shadow-2xl flex items-center gap-3 animate-in fade-in slide-in-from-bottom-4 duration-300 z-[100]';
                toast.innerHTML = '<span class="material-symbols-outlined">pill</span> Registro actualizado correctamente';
                document.body.appendChild(toast);

                setTimeout(() => {
                    toast.classList.add('animate-out', 'fade-out', 'slide-out-to-bottom-4');
                    setTimeout(() => toast.remove(), 300);
                    
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    btn.classList.remove('bg-on-primary-fixed-variant');
                    btn.classList.add('bg-primary');
                }, 3000);
            }, 1500);
        });
    </script>
