<style>
        body {
            background: linear-gradient(135deg, #fbf9f8 0%, #e8f3f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }
        .login-card {
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .login-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }
        .input-field:focus {
            box-shadow: 0 0 0 4px rgba(175, 239, 223, 0.4);
            background-color: #ffffff;
            border-color: #28695c;
        }
        .btn-press:active {
            transform: scale(0.95);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .leaf-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }
    </style>

<body class="font-body-md text-on-surface">
<!-- Decorative background elements -->
<div class="absolute top-10 left-10 opacity-20 pointer-events-none leaf-float">
<span class="material-symbols-outlined text-[120px] text-primary">eco</span>
</div>
<div class="absolute bottom-10 right-10 opacity-10 pointer-events-none leaf-float" style="animation-delay: -2s;">
<span class="material-symbols-outlined text-[180px] text-primary-container">spa</span>
</div>
<main class="w-full max-w-[440px] px-margin-mobile md:px-0">
<div class="login-card bg-surface-container-lowest rounded-[24px] p-8 md:p-12 relative overflow-hidden">
<!-- Branding/Logo Section -->
<header class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 bg-primary-container rounded-full mb-6">
<span class="material-symbols-outlined text-on-primary-container text-4xl" data-icon="health_and_safety">health_and_safety</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary mb-2">FarmaVida</h1>
<p class="font-body-md text-on-surface-variant">Bienvenido a FarmaVida: Cuidamos de ti</p>
</header>
<!-- Login Form -->
<form action="#" class="space-y-6" method="POST" onsubmit="event.preventDefault();">
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface-variant ml-1" for="username">Usuario o Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl">person</span>
<input class="input-field w-full h-14 pl-12 pr-4 bg-surface-container rounded-[16px] border-none outline-none font-body-md text-on-surface transition-all duration-300" id="username" name="username" placeholder="juan.perez@ejemplo.com" type="text"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block font-label-md text-label-md text-on-surface-variant" for="password">Contraseña</label>
<a class="font-label-sm text-label-sm text-primary hover:underline transition-all" href="#">¿Olvidaste tu contraseña?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl">lock</span>
<input class="input-field w-full h-14 pl-12 pr-12 bg-surface-container rounded-[16px] border-none outline-none font-body-md text-on-surface transition-all duration-300" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<div class="flex items-center space-x-3 px-1">
<input class="w-5 h-5 rounded-[6px] border-outline-variant text-primary focus:ring-primary-container" id="remember" type="checkbox"/>
<label class="font-label-md text-label-md text-on-surface-variant" for="remember">Recordarme en este equipo</label>
</div>
<button class="btn-press w-full h-14 bg-primary text-on-primary font-headline-md text-headline-md rounded-[16px] shadow-sm hover:bg-on-primary-container transition-all duration-300 flex items-center justify-center gap-2" type="submit">
<span>Entrar</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</form>
<footer class="mt-10 pt-8 border-t border-surface-variant text-center">
<p class="font-label-md text-label-md text-on-surface-variant mb-4">¿No tienes una cuenta aún?</p>
<button class="btn-press px-8 h-12 bg-secondary-container text-on-secondary-container font-label-md text-label-md rounded-[16px] hover:bg-secondary-fixed transition-all duration-300">
                    Solicitar acceso
                </button>
</footer>
</div>
<div class="mt-8 text-center">
<div class="flex justify-center gap-6 mb-4">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Privacidad</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Términos</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Ayuda</a>
</div>
<p class="font-label-sm text-label-sm text-outline">© 2024 FarmaVida Pharmacy Management.</p>
</div>
</main>
<!-- Success Feedback Simulation Script -->
<script>
        const loginBtn = document.querySelector('button[type="submit"]');
        loginBtn.addEventListener('click', () => {
            const originalContent = loginBtn.innerHTML;
            loginBtn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span class="ml-2">Conectando...</span>
            `;
            
            setTimeout(() => {
                loginBtn.innerHTML = originalContent;
            }, 2000);
        });

        // Toggle password visibility
        const togglePass = document.querySelector('button[type="button"]');
        const passInput = document.querySelector('#password');
        togglePass.addEventListener('click', () => {
            const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passInput.setAttribute('type', type);
            togglePass.querySelector('span').textContent = type === 'password' ? 'visibility' : 'visibility_off';
        });
    </script>
</body></html>
